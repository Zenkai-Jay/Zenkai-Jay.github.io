<!DOCTYPE html>
<html>

<head>
    <title>Classes - Music Time</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1 class="page-title">Classes</h1>
    <h2 class="page-subtitle">Music Time</h2>

    <main id="gallery" class="gallery"></main>

    <footer>@Zenkai_Jay.com</footer>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">

            <span class="close-btn" id="closeBtn">&times;</span>

            <div class="modal-body">

                <div class="modal-video">
                    <iframe id="modalIframe" src="" frameborder="0" allowfullscreen>
                    </iframe>
                </div>

                <div class="modal-info">
                    <h3 id="modalTitle"></h3>
                    <p>By <span id="modalArtist"></span></p>
                    <p><span id="modalAlbum"></span>, <span id="modalYear"></span></p>
                    <p><span id="modalGenre"></span></p>
                </div>

            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
